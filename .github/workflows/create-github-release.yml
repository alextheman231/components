name: Create GitHub Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-github-release:
    if: ${{ github.repository == 'alextheman231/components' }}
    uses: alextheman231/github-actions/.github/workflows/create-github-release.yml@37105e9531353a1e0d4914cf954e10efe03a4bdf # v11.0.0
    secrets:
      APP_ID: ${{ secrets.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
